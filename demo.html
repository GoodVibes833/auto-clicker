<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Auto Click Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #a78bfa;
      letter-spacing: 2px;
    }

    #status {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 36px;
    }

    #log {
      width: 100%;
      max-width: 600px;
      background: #1a1a2e;
      border: 1px solid #2d2d4e;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.85rem;
      color: #94a3b8;
      min-height: 60px;
      margin-bottom: 36px;
      font-family: monospace;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 600px;
    }

    .btn {
      padding: 22px 16px;
      border: 2px solid #3b3b6e;
      border-radius: 12px;
      background: #16162a;
      color: #c4b5fd;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      border-color: #7c3aed;
      background: #1e1b4b;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35);
    }

    .btn.clicked {
      background: #7c3aed;
      border-color: #a78bfa;
      color: #fff;
      transform: scale(0.96);
      box-shadow: 0 0 24px rgba(167, 139, 250, 0.6);
    }

    .btn .icon { font-size: 1.5rem; display: block; margin-bottom: 6px; }

    #counter-bar {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
      color: #6b7280;
      font-size: 0.85rem;
    }

    #total-clicks {
      font-size: 1.4rem;
      font-weight: 700;
      color: #a78bfa;
    }
  </style>
</head>
<body>

  <h1>AUTO CLICK DEMO</h1>
  <div id="status">Idle — buttons will be clicked automatically when AHK runs</div>

  <div id="log">No log yet</div>

  <div class="grid">
    <button class="btn" id="btn1" onclick="handleClick(this, 'Start')">
      <span class="icon">▶</span>Start
    </button>
    <button class="btn" id="btn2" onclick="handleClick(this, 'Stop')">
      <span class="icon">⏸</span>Stop
    </button>
    <button class="btn" id="btn3" onclick="handleClick(this, 'Refresh')">
      <span class="icon">🔄</span>Refresh
    </button>
    <button class="btn" id="btn4" onclick="handleClick(this, 'Save')">
      <span class="icon">💾</span>Save
    </button>
    <button class="btn" id="btn5" onclick="handleClick(this, 'Upload')">
      <span class="icon">⬆</span>Upload
    </button>
    <button class="btn" id="btn6" onclick="handleClick(this, 'Download')">
      <span class="icon">⬇</span>Download
    </button>
    <button class="btn" id="btn7" onclick="handleClick(this, 'Settings')">
      <span class="icon">⚙</span>Settings
    </button>
    <button class="btn" id="btn8" onclick="handleClick(this, 'Analyze')">
      <span class="icon">📊</span>Analyze
    </button>
    <button class="btn" id="btn9" onclick="handleClick(this, 'Reset')">
      <span class="icon">🗑</span>Reset
    </button>
    <button class="btn" id="btn10" onclick="handleClick(this, 'Done')">
      <span class="icon">✅</span>Done
    </button>
  </div>

  <div id="counter-bar">
    <span>Total Clicks</span>
    <span id="total-clicks">0</span>
  </div>

  <script>
    let totalClicks = 0;

    function handleClick(btn, name) {
      totalClicks++;
      document.getElementById('total-clicks').textContent = totalClicks;

      btn.classList.add('clicked');
      setTimeout(() => btn.classList.remove('clicked'), 400);

      const now = new Date().toLocaleTimeString('en-US');
      const log = document.getElementById('log');
      log.textContent = `[${now}]  "${name}" button clicked  (total: ${totalClicks})`;

      document.getElementById('status').textContent = `Last clicked: ${name}`;
    }
  </script>
</body>
</html>
